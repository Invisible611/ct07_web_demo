<body>
    <h1>Math Form</h1>
    <form action="/cal" method="get">
        Enter num 1:<input type="text" name="num1"/><br/>
        Enter num 2:<input type="text" name="num2"/><br/>
        <select name="opt">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select><br/>
        <input type="submit" value="CALCULATE"/>
    </form>
</body>
